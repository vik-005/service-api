framework:
    messenger:
        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    use_notify: true
                    check_delayed_interval: 1000
            failed: 'doctrine://default?queue_name=failed'

        routing:
            'App\Message\*': async

when@dev:
    framework:
        messenger:
            transports:
                async: 'sync://'
